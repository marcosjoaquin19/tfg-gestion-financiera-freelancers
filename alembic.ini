[alembic]
# Carpeta donde viven env.py y las versiones
script_location = alembic

# prepend_sys_path = . permite importar "app.*" desde env.py
prepend_sys_path = .

# La URL real la inyecta env.py leyendo DATABASE_URL del .env
# (este valor es un placeholder que Alembic nunca usa directamente)
sqlalchemy.url = driver://user:pass@localhost/dbname

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
